 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        html,body{
            width: 100%;
            height: 100%;
        }
        body{
             padding: 0;
            margin: 0;
            box-sizing: border-box;
            color: white;
            font-family: Arial, Helvetica, sans-serif;

        }
        nav{
            width: 100%;
            background-color: black;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }
        .logo{
            font-size: 22px;
            cursor: pointer;
            position: relative;
            display: inline-block;
        }
        .logo::after{
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            height: 3px;
            width: 0%;
            background-color: brown;
            transition: 0.5s;
        }
        .logo:hover::after{
            width: 100%;
        }
        ul{
            list-style: none;
            display: flex; 
            gap: 50px;
        }
        ul li{
              cursor: pointer;
            position: relative;
        }
        ul li::after{
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            height: 3px;
            width: 0%;
            background-color: brown;
            transition: 0.5s;
        }
        ul li:hover::after{
             width: 100%;
        }
    </style>
 </head>
 <body>
    
    <nav>
        <div class="logo">Nilesh</div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Project</li>
            <li>Contact</li>
        </ul>
    </nav>

 </body>
 </html>
